{% extends "base.html" %}

{% block content %}
<div class="card card-form">
    <h2>Добавить сечение</h2>

    <form method="post" action="/sections/new" class="form">
        <div class="form-row">
            <label for="section_name">Название</label>
            <input type="text" id="section_name" name="section_name" required>
        </div>

        <div class="form-row">
            <label for="section_type_id">Тип сечения</label>
            <select id="section_type_id" name="section_type_id" required>
                <option value="">Выберите тип...</option>
                {% for t in section_types %}
                    <option value="{{ t.section_type_id }}">{{ t.section_type_name }}</option>
                {% endfor %}
            </select>
            <div class="hintline"><a href="/section-types/new">+ Добавить тип сечения</a></div>
        </div>

        <div class="form-row">
            <label for="material_id">Материал</label>
            <select id="material_id" name="material_id" required>
                <option value="">Выберите материал...</option>
                {% for m in materials %}
                    <option value="{{ m.material_id }}">{{ m.material_name }}</option>
                {% endfor %}
            </select>
            <div class="hintline"><a href="/materials/new">+ Добавить материал</a></div>
        </div>

        <div class="form-row">
            <label for="notes">Примечание</label>
            <textarea id="notes" name="notes" rows="3"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/sections" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
