{% extends "base.html" %}

{% block content %}
<div class="card card-form">
    <h2>Добавить материал</h2>

    <form method="post" action="/materials/new" class="form">
        <div class="form-row">
            <label for="material_name">Название</label>
            <input type="text" id="material_name" name="material_name" required>
        </div>

        <div class="form-row">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="2"></textarea>
        </div>

        <div class="form-row">
            <label for="characteristics">Характеристики</label>
            <textarea id="characteristics" name="characteristics" rows="2"></textarea>
        </div>

        <div class="grid-2">
            <div class="form-row">
                <label for="strength_mpa">Прочность (МПа)</label>
                <input type="number" step="0.01" id="strength_mpa" name="strength_mpa">
            </div>
            <div class="form-row">
                <label for="hardness_hb">Твёрдость (HB)</label>
                <input type="number" step="0.01" id="hardness_hb" name="hardness_hb">
            </div>
            <div class="form-row">
                <label for="poisson_ratio">Пуассон</label>
                <input type="number" step="0.001" id="poisson_ratio" name="poisson_ratio">
            </div>
            <div class="form-row">
                <label for="young_modulus_gpa">Юнг (ГПа)</label>
                <input type="number" step="0.01" id="young_modulus_gpa" name="young_modulus_gpa">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/materials" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
