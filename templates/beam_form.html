{% extends "base.html" %}

{% block content %}
<div class="card card-form">
    <h2>Добавить балку</h2>

    <form method="post" action="/beams/new" class="form">
        <div class="form-row">
            <label for="beam_name">Название</label>
            <input type="text" id="beam_name" name="beam_name" required>
        </div>

        <div class="form-row">
            <label for="section_id">Сечение</label>
            <select id="section_id" name="section_id" required>
                <option value="">Выберите сечение...</option>
                {% for s in sections %}
                    <option value="{{ s.section_id }}">{{ s.section_name }}</option>
                {% endfor %}
            </select>
            <div class="hintline"><a href="/sections/new">+ Добавить сечение</a></div>
        </div>

        <div class="form-row">
            <label for="material_id">Материал</label>
            <select id="material_id" name="material_id" required>
                <option value="">Выберите материал...</option>
                {% for m in materials %}
                    <option value="{{ m.material_id }}">{{ m.material_name }}</option>
                {% endfor %}
            </select>
            <div class="hintline"><a href="/materials/new">+ Добавить материал</a></div>
        </div>

        <div class="form-row">
            <label for="length_m">Длина балки, м</label>
            <input type="number" step="0.01" id="length_m" name="length_m" required>
        </div>

        <div class="form-row">
            <label for="notes">Примечание</label>
            <textarea id="notes" name="notes" rows="3"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/beams" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
