{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Материалы</h2>
        <a class="btn btn-primary" href="/materials/new">+ Добавить материал</a>
    </div>

    <div class="table-wrapper">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Описание</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            {% for m in materials %}
                <tr>
                    <td>{{ m.material_id }}</td>
                    <td>{{ m.material_name }}</td>
                    <td>{{ m.description if m.description else "—" }}</td>
                    <td class="table-actions">
                        <form method="post" action="/materials/{{ m.material_id }}/delete">
                            <button class="btn btn-danger" onclick="return confirm('Удалить материал?');">
                                Удалить
                            </button>
                        </form>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
